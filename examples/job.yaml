# Credentials are NOT stored here. Run `revit auth login` to authenticate.
revit:
  version: "latest"

app:
  name: "myRevitJob"
  description: "Example Revit automation job"
  path: "./examples/sample-appbundle/SamplePlugin.bundle"

environment: "prod"

inputs:
  model:
    type: "cloudWorksharedModel"
    folderUrl: "https://acc.autodesk.com/docs/files/projects/00000000-0000-0000-0000-000000000000?folderUrn=urn%3Aadsk.wipprod%3Afs.folder%3Aco.example&viewModel=detail&moduleId=folders"
    modelName: "MyBuilding"
    save: true
    openOption: "OpenAllWorksets"
  tool:
    name: "fill_parameters"
    inputs: "C:\\path\\to\\toolinputs.json"

outputs:
  result:
    type: "file"
    path: "./outputs/result.zip"
