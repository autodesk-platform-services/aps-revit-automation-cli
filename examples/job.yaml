authentication:
  clientId: "YOUR_CLIENT_ID"
  clientSecret: "YOUR_CLIENT_SECRET"

revit:
  version: "latest"

app:
  name: "my-revit-job"
  description: "Example Revit automation job"
  path: "./examples/sample-appbundle"

inputs:
  model:
    type: "cloudWorksharedModel"
    folderUrl: "https://acc.autodesk.com/docs/files/projects/00000000-0000-0000-0000-000000000000?folderUrn=urn%3Aadsk.wipprod%3Afs.folder%3Aco.example&viewModel=detail&moduleId=folders"
    modelName: "MyBuilding"
  params:
    someValue: "example"

outputs:
  result:
    type: "file"
    path: "./outputs/result.zip"
