      #   run: |
      #     dotnet pack src/RevitCli/RevitCli.csproj -c Release -p:Version=${{ steps.version.outputs.version }}
      #     dotnet nuget push src/RevitCli/nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
